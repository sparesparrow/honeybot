version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: scaipot
      POSTGRES_USER: scaipot
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scaipot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scaipot_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme} --maxmemory 256mb --maxmemory-policy lru
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scaipot_network

  # MCP-Prompts Server
  mcp-prompts:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm start"
    environment:
      MODE: http
      PORT: 3003
      STORAGE_TYPE: file
      PROMPTS_DIR: /app/data/honeypots
      NODE_ENV: ${ENV:-development}
    ports:
      - "3003:3003"
    volumes:
      - ../external/mcp-prompts:/app
      - ./config/honeypot_categories:/app/data/honeypots:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scaipot_network

  # SCAIPOT Core Application
  scaipot:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      SIGNAL_PHONE_NUMBER: ${SIGNAL_PHONE_NUMBER}
      MCP_PROMPTS_URL: http://mcp-prompts:3003
      DATABASE_URL: postgresql://scaipot:${DATABASE_PASSWORD:-changeme}@postgres/scaipot
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENV: ${ENV:-development}
      DEBUG: ${DEBUG:-true}
    ports:
      - "8000:8000"  # FastAPI/REST API
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mcp-prompts:
        condition: service_healthy
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock  # For VM spawning
    command: python -m scaipot.main
    networks:
      - scaipot_network

  # Grafana Monitoring (Optional)
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: ""
    volumes:
      - grafanadata:/var/lib/grafana
    depends_on:
      - postgres
    networks:
      - scaipot_network
    profiles:
      - monitoring

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  grafanadata:
    driver: local

networks:
  scaipot_network:
    name: scaipot_network
    driver: bridge
