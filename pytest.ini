[pytest]
# Pytest configuration for SCAIPOT

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Async support
asyncio_mode = auto

# Coverage configuration
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=src/scaipot
    --cov-report=html:htmlcov
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=75

# Markers for test categorization
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow-running tests
    requires_redis: Tests requiring Redis connection
    requires_postgres: Tests requiring PostgreSQL connection
    requires_mcp: Tests requiring MCP-Prompts server
    requires_telegram: Tests requiring Telegram API
    voice: Voice-related tests
    mqtt: MQTT-related tests

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings
filterwarnings =
    error
    ignore::UserWarning
    ignore::DeprecationWarning

# Timeout for tests (10 seconds default)
timeout = 10
timeout_method = thread
